<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Estufa Inteligente - Agrinho 2026</title>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #8e24aa;
            --bg: #f1f8e9;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { color: var(--primary); text-align: center; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        
        .controls, .results { padding: 15px; border: 1px solid #ddd; border-radius: 10px; }
        
        label { display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .status-bar { height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .fill { height: 100%; transition: width 0.3s; width: 50%; }
        
        .quality-high { background: #4caf50; }
        .quality-med { background: #ffeb3b; }
        .quality-low { background: #f44336; }

        .metric { font-size: 1.2em; margin: 10px 0; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍇 Simulador de Estufa de Uva</h1>
    <p style="text-align: center;"><strong>Tema:</strong> Agro Forte, Futuro Sustentável</p>

    <div class="dashboard">
        <div class="controls">
            <h3>Ajustes da Estufa</h3>
            
            <label>Temperatura: <span id="valTemp">25</span>°C</label>
            <input type="range" id="temp" min="0" max="45" value="25">

            <label>Umidade do Solo: <span id="valSolo">60</span>%</label>
            <input type="range" id="solo" min="0" max="100" value="60">

            <label>Umidade do Ar: <span id="valAr">50</span>%</label>
            <input type="range" id="ar" min="0" max="100" value="50">
        </div>

        <div class="results">
            <h3>Status da Produção</h3>
            
            <div class="metric">Saúde da Planta: <span id="statusSaude">Excelente</span></div>
            <div class="status-bar"><div id="barSaude" class="fill quality-high"></div></div>

            <div class="metric">Qualidade do Fruto (Brix): <span id="valBrix">18</span>°</div>
            <div class="status-bar"><div id="barBrix" class="fill quality-high"></div></div>
            
            <p id="feedback" style="font-style: italic; margin-top: 15px; color: #555;"></p>
        </div>
    </div>

    <div class="footer">
        Proposta para o Concurso Agrinho 2026 - Sustentabilidade e Tecnologia.
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input[type="range"]');
    
    function atualizarSimulador() {
        const temp = parseInt(document.getElementById('temp').value);
        const solo = parseInt(document.getElementById('solo').value);
        const ar = parseInt(document.getElementById('ar').value);

        // Atualiza os números na tela
        document.getElementById('valTemp').innerText = temp;
        document.getElementById('valSolo').innerText = solo;
        document.getElementById('valAr').innerText = ar;

        // Lógica de Cálculo de Saúde (Simples)
        let saude = 100;
        let feedback = "Condições ideais detectadas.";

        // Penalidade por temperatura (Ideal entre 18 e 28)
        if (temp < 15 || temp > 32) {
            saude -= 30;
            feedback = "Temperatura fora do ideal! Estresse térmico detectado.";
        }
        
        // Penalidade por umidade do solo (Ideal entre 50 e 70)
        if (solo < 40) {
            saude -= 20;
            feedback = "Solo muito seco. A videira precisa de irrigação.";
        } else if (solo > 80) {
            saude -= 20;
            feedback = "Solo encharcado. Risco de apodrecimento das raízes.";
        }

        // Penalidade por umidade do ar (Ideal para evitar fungos < 70%)
        if (ar > 75) {
            saude -= 25;
            feedback = "Umidade muito alta! Risco de fungos e doenças.";
        }

        // Cálculo do Grau Brix (Açúcar) baseado na temperatura e saúde
        let brix = (temp > 20 && temp < 30) ? (16 + (temp/10)) : 12;
        if (saude < 50) brix -= 5;
        if (brix < 0) brix = 0;

        // Atualizar Barras Visuais
        const barSaude = document.getElementById('barSaude');
        barSaude.style.width = saude + "%";
        barSaude.className = "fill " + (saude > 70 ? "quality-high" : (saude > 40 ? "quality-med" : "quality-low"));

        document.getElementById('valBrix').innerText = brix.toFixed(1);
        document.getElementById('barBrix').style.width = (brix * 4) + "%";
        document.getElementById('statusSaude').innerText = saude > 70 ? "Boa" : (saude > 40 ? "Regular" : "Crítica");
        document.getElementById('feedback').innerText = feedback;
    }

    // Adiciona evento de mudança em cada slider
    inputs.forEach(input => input.addEventListener('input', atualizarSimulador));

    // Inicia o simulador
    atualizarSimulador();
</script>

</body>
</html>
